global:
  scrape_interval: 90s
  evaluation_interval: 90s
  external_labels:
    monitor: 'milvus-monitor'

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "prometheus"
    scrape_timeout: 10s
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: "milvus"
    scrape_timeout: 10s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__name__]
        regex: '^(milvus_.*_qps|milvus_.*_latency|milvus_memory_usage|milvus_service_health|up)$'
        action: keep
    static_configs:
      - targets:
          - "127.0.0.1:9091"